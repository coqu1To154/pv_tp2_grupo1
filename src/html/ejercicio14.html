<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 14</title>
</head>
<body>
    <script>
        const cantidad = parseInt(prompt("¿Cuantos numeros va a ingresar?"));

        let numeros = [];

        for (let i = 0; i < cantidad; i++){
            let num = parseInt(prompt(`Ingrese el numero ${i+1}:`));
            numeros.push(num);
        }
        //funcion flecha
        const duplicar = (arreglo) => {
            let nuevoArray = [];

            for (let i = 0; i < arreglo.length; i++){
                nuevoArray.push(arreglo[i] * 2);
            }

            return nuevoArray;
        };

        const resultado = duplicar(numeros);

        document.write(`Array original: ${numeros}<br>`);
        document.write(`Array duplicado: ${resultado}`);

    </script>
</body>
</html>
