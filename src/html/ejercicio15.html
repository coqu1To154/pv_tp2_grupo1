<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 15</title>
</head>
<body>

    <script>
        const retornarMes = (numero) => {
            const meses = [
                "Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio",
                "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"
            ];

            if (numero >= 1 && numero <= 12) {
                return meses[numero - 1];
            } else {
                return "No es un mes"; 
            }
        };

        const input = prompt("Ingrese un número entero para conocer el mes:");
        const numEscogido = parseInt(input);

        if (!isNaN(numEscogido)) {
            const resultado = retornarMes(numEscogido);
            document.write(`<h1>Resultado:</h1>`);
            document.write(`<p>Para el número ${numEscogido}, el resultado es: <strong>${resultado}</strong></p>`);
        } else {
            document.write(`<p>Por favor, ingrese un número válido.</p>`);
        }
    </script>
    
</body>
</html>
