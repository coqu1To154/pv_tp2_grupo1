<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 17</title>
</head>
<body>
    <script>
        const contarLetraA = (cadena) => {
        let contador = 0;
        cadena = prompt("Ingrese una cadena: ");
        for(let i=0;i<cadena.length;i++){
            if(cadena[i] == 'a' || cadena[i] =='A'){
                contador++;
            }
        }
            return contador;
        }
        alert(`Cantidad de letras 'a' en la cadena: ${contarLetraA()}`);
    </script>
</body>
</html>
