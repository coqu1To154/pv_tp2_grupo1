<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 12</title>
</head>
<body>
    <script>
        const verificarParidad = () => {
            let numero = prompt("Ingrese un número:");

            if (numero % 2 === 0) {
                document.write(`<h3>El número ${numero} es par.</h3>`);
            } else {
                document.write(`<h3>El número ${numero} es impar.</h3>`);
            }
        };

        verificarParidad();
    </script>
</body>
</html>
